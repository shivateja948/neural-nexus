<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Pulse AI | Project 2</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { padding: 40px; text-align: center; }
        .chart-container { width: 80%; max-width: 800px; margin: 40px auto; background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; }
        .dashboard-link { margin-top: 20px; display: inline-block; color: #00ff88; text-decoration: none; }
    </style>
</head>
<body>
    <h1 class="title-reveal fade-in">Quantum Pulse Financial AI</h1>
    <p class="subtitle">Predictive Market Velocity & Volatility Analysis.</p>
    
    <div class="chart-container">
        <canvas id="pulse-chart"></canvas>
    </div>

    <div style="display: flex; justify-content: space-around; max-width: 600px; margin: 20px auto;">
        <div style="text-align:center;">
            <div style="color: #00ff88; font-size: 1.5rem; font-weight: 800;">+12.4%</div>
            <div style="font-size: 0.8rem; color:#666;">PREDICTED APY</div>
        </div>
         <div style="text-align:center;">
            <div style="color: #00d2ff; font-size: 1.5rem; font-weight: 800;">LOW</div>
            <div style="font-size: 0.8rem; color:#666;">RISK QUARTILE</div>
        </div>
    </div>

    <a href="../index.html" class="dashboard-link">← Return to Neural Nexus Hub</a>

    <script>
        const ctx = document.getElementById('pulse-chart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00'],
                datasets: [{
                    label: 'Market Velocity',
                    data: [65, 59, 80, 81, 76, 85, 92, 110],
                    borderColor: '#00d2ff',
                    backgroundColor: 'rgba(0, 210, 255, 0.1)',
                    fill: true,
                    tension: 0.4
                }, {
                    label: 'AI Projected Growth',
                    data: [60, 65, 75, 85, 95, 105, 115, 125],
                    borderColor: '#00ff88',
                    borderDash: [5, 5],
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: '#222' }, ticks: { color: '#666' } },
                    x: { grid: { color: '#222' }, ticks: { color: '#666' } }
                },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });
    </script>
</body>
</html>
