<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Hub | AI Assistant</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { padding: 40px; }
        .chat-hub { max-width: 800px; margin: 0 auto; background: #111; padding: 2rem; border-radius: 24px; border: 1px solid #333; }
        #chat-box { height: 400px; overflow-y: auto; background: #050505; border-radius: 12px; padding: 1.5rem; margin-bottom: 20px; }
        .input-group { display: flex; gap: 1rem; }
        input { flex: 1; padding: 1rem; border-radius: 12px; background: #222; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="chat-hub">
        <h1 class="title-reveal fade-in">Enterprise Cognitive Hub</h1>
        <p class="subtitle">Corporate Knowledge & Automation Hub</p>
        <div id="chat-box"></div>
        <div class="input-group">
            <input type="text" id="chat-input" placeholder="Query corporate documentation...">
            <button onclick="send()" class="neon-button">EXECUTE</button>
        </div>
        <a href="../index.html" style="margin-top:20px; display:inline-block; color:#ff007a;">← Dashboard</a>
    </div>

    <script>
        const box = document.getElementById('chat-box');
        const input = document.getElementById('chat-input');
        function send() {
            if(!input.value) return;
            box.innerHTML += `<div style="text-align:right; color:#888; margin-bottom:10px;">${input.value}</div>`;
            const t = input.value.toLowerCase();
            input.value = '';
            setTimeout(() => {
                let r = "Neural nodes synchronized. Scanning sectors...";
                if(t.includes('status')) r = "Operations nominal. Efficiency 98.4%.";
                box.innerHTML += `<div style="color:#ff007a; margin-bottom:10px;">AI: ${r}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
